<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>PA Program Router</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
			crossorigin="anonymous" />
		<link rel="stylesheet" href="style.css?v=3" />
	</head>
	<body>
		<!-- Maintenance Overlay -->
		<div id="maintenance-screen" style="display: none">
			<div
				class="d-flex justify-content-center align-items-center"
				style="min-height: 100vh">
				<div class="text-center p-5">
					<div style="font-size: 4rem">&#9888;</div>
					<h3 class="mt-3 mb-2">Under Maintenance</h3>
					<p class="text-muted" id="maintenance-message">
						PA Router is temporarily unavailable.
					</p>
				</div>
			</div>
		</div>

		<div class="bg">VAN PUB AFF PRO RTR</div>
		<div id="main-content" class="d-flex justify-content-evenly gap-2 maxwidth">
			<div class="p-3">
				<form id="formadd">
					<div class="mb-3">
						<label for="prefix" class="form-label"
							>Series Prefix<sup>*Required</sup></label
						>
						<input
							type="text"
							class="form-control"
							id="prefix"
							name="prefix"
							oninput="validate(this)"
							required
							autocomplete="off" />
					</div>
					<div class="mb-3">
						<label for="seriesName" class="form-label"
							>Series Name<sup>*Required</sup></label
						>
						<input
							type="text"
							class="form-control"
							id="seriesName"
							name="seriesName"
							required
							autocomplete="off" />
					</div>
					<div>
						<label class="form-label">Where Do They Go?</label>
						<div class="d-flex flex-wrap choices">
							<div class="mb-2 me-3 form-check d-flex">
								<input
									type="checkbox"
									class="form-check-input"
									id="toWeb"
									name="toWhom[]"
									value="toWeb" />
								<label class="form-check-label" for="toWeb">To Web</label>
							</div>
							<div class="mb-2 me-3 form-check d-flex">
								<input
									type="checkbox"
									class="form-check-input"
									id="toVOS"
									name="toWhom[]"
									value="toVOS" />
								<label class="form-check-label" for="toVOS">To VOS</label>
							</div>
							<div class="mb-2 me-3 form-check d-flex">
								<input
									type="checkbox"
									class="form-check-input"
									id="toNexio"
									name="toWhom[]"
									value="toNexio" />
								<label class="form-check-label" for="toNexio">To Nexio</label>
							</div>
							<div class="mb-2 me-3 form-check d-flex">
								<input
									type="checkbox"
									class="form-check-input"
									id="toAffiliate"
									name="toWhom[]"
									value="toAffiliate" />
								<label class="form-check-label" for="toAffiliate"
									>To Affil</label
								>
							</div>
							<div class="mb-2 form-check d-flex">
								<input
									type="checkbox"
									class="form-check-input"
									id="toTMD"
									name="toWhom[]"
									value="toTMD" />
								<label class="form-check-label" for="toTMD">To TMD</label>
							</div>
						</div>
					</div>
					<div class="mb-3">
						<label for="folderPath" class="form-label">Folder Path</label>
						<input
							type="text"
							class="form-control"
							id="folderPath"
							name="folderPath"
							autocomplete="off" />
					</div>
					<button type="submit" class="btn btn-primary">Add</button>
				</form>
			</div>
			<div class="p-3">
				<div>
					<form id="formfind">
						<div class="mb-3">
							<label for="search_prefix" class="form-label"
								>Series Prefix</label
							>
							<input
								type="text"
								class="form-control"
								id="search_prefix"
								oninput="validate(this)"
								required
								autocomplete="off" />
						</div>
						<button type="submit" class="btn btn-primary">Find</button>
					</form>
				</div>
				<div id="results" class="invisible">
					<hr />
					<form id="formresult">
						<input
							type="hidden"
							class="form-control"
							id="searched_id"
							name="searched_id"
							value="" />
						<div class="mb-3">
							<label for="searched_prefix" class="form-label"
								>Series Prefix</label
							>
							<input
								type="text"
								class="form-control mb-3"
								id="searched_prefix"
								name="searched_prefix"
								value=""
								readonly
								autocomplete="off" />
						</div>
						<div class="mb-3">
							<label for="searched_program" class="form-label"
								>Series Name</label
							>
							<input
								type="text"
								class="form-control mb-3"
								id="searched_program"
								name="searched_program"
								value="" />
						</div>
						<div>
							<label for="searched_program" class="form-label"
								>Where Do They Go?</label
							>
							<div class="d-flex flex-wrap choices">
								<div class="mb-2 me-3 form-check d-flex">
									<input
										type="checkbox"
										class="form-check-input"
										id="searched_toWeb"
										name="updateToWhom[]"
										value="toWeb" />
									<label class="form-check-label" for="searched_toWeb"
										>To Web</label
									>
								</div>
								<div class="mb-2 me-3 form-check d-flex">
									<input
										type="checkbox"
										class="form-check-input"
										id="searched_toVOS"
										name="updateToWhom[]"
										value="toVOS" />
									<label class="form-check-label" for="searched_toVOS"
										>To VOS</label
									>
								</div>
								<div class="mb-2 me-3 form-check d-flex">
									<input
										type="checkbox"
										class="form-check-input"
										id="searched_toNexio"
										name="updateToWhom[]"
										value="toNexio" />
									<label class="form-check-label" for="searched_toNexio"
										>To Nexio</label
									>
								</div>
								<div class="mb-2 me-3 form-check d-flex">
									<input
										type="checkbox"
										class="form-check-input"
										id="searched_toAffiliate"
										name="updateToWhom[]"
										value="toAffiliate" />
									<label class="form-check-label" for="searched_toAffiliate"
										>To Affil</label
									>
								</div>
								<div class="mb-2 form-check d-flex">
									<input
										type="checkbox"
										class="form-check-input"
										id="searched_toTMD"
										name="updateToWhom[]"
										value="toTMD" />
									<label class="form-check-label" for="searched_toTMD"
										>To TMD</label
									>
								</div>
							</div>
						</div>
						<div class="mb-3">
							<label for="searched_path" class="form-label">Folder Path</label>
							<input
								type="text"
								class="form-control mb-3"
								id="searched_path"
								name="searched_path"
								value="" />
						</div>
						<button type="submit" class="btn btn-primary mb-3">Update</button>
					</form>
					<form id="formresult_delete">
						<input
							type="hidden"
							class="form-control"
							id="searched_id_delete"
							value="" />
						<button type="submit" class="btn btn-danger">Delete</button>
					</form>
				</div>
			</div>
		</div>
		<script src="index.js?v=7"></script>
	</body>
</html>
